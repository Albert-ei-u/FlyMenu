services:
  - type: web
    name: flymenu-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run prisma:deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: flymenu-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: API_PREFIX
        value: api/v1

databases:
  - name: flymenu-db
    plan: free
