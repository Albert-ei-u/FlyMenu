services:
  postgres:
    image: postgres:16-alpine
    container_name: flymenu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flymenu
    ports:
      - "5432:5432"
    volumes:
      - flymenu-postgres-data:/var/lib/postgresql/data

volumes:
  flymenu-postgres-data:
